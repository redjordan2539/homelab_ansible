---
container_ip_prefix: 10.220.1
container_dns_ip: 10.220.1.2

podman_containers:
  npm:
    image_url: docker.io/jc21/nginx-proxy-manager:latest
    ip_address_octet: "3"
    published_ports:
      - host_port: 80
        container_port: 80
        proto: tcp
      - host_port: 81
        container_port: 81
        proto: tcp
      - host_port: 443
        container_port: 443
        proto: tcp
      - host_port: 443
        container_port: 443
        proto: udp
      - host_port: 853
        container_port: 853
        proto: tcp
    volumes:
      - host_path: /appdata/podman/nginx-proxy-manager/data
        container_path: /data
        flags: U
      - host_path: /appdata/podman/nginx-proxy-manager/etc
        container_path: /etc/letsencrypt
        flags: U
  mc-vanilla:
    image_url: docker.io/itzg/minecraft-server:latest
    ip_address_octet: "5"
    published_ports:
      - host_port: 25565
        container_port: 25565
        proto: tcp
    volumes: 
      - host_path: /appdata/podman/mc-vanilla
        container_path: /data
        flags: U
    env_vars:
      - name: EULA
        value: TRUE
      - name: TYPE
        value: VANILLA
      - name: MEMORY
        value: "4G"
      - name: MAX_IDLE_TIME
        value: "0"
  jellyfin:
    image_url: docker.io/jellyfin/jellyfin
    ip_address_octet: "4"
    volumes:
      - host_path: /appdata/podman/jellyfin/config
        container_path: /config
        flags: U
      - host_path: /appdata/podman/jellyfin/cache
        container_path: /cache
        flags: U
      - host_path: /storage/media
        container_path: /media
    env_vars:
      - name: TZ
        value: America/Los_Angeles
      - name: PUID
        value: 1000
      - name: PGID
        value: 1000
    devices:
      - nvidia.com/gpu=all
  filebrowser:
    image_url: docker.io/filebrowser/filebrowser:latest
    ip_address_octet: "6"
    volumes:
      - host_path: /appdata/podman/filebrowser/database
        container_path: /database
        flags: U
      - host_path: /appdata/podman/filebrowser/config
        container_path: /config
        flags: U
      - host_path: /storage
        container_path: /srv
    env_vars:
      - name: PUID
        value: 1000
      - name: PGID
        value: 1000
  freshrss:
    image_url: docker.io/freshrss/freshrss:latest
    ip_address_octet: "7"
    volumes:
      - host_path: /appdata/podman/freshrss/data
        container_path: /var/www/FreshRSS/data
        flags: U
      - host_path: /appdata/podman/freshrss/extensions
        container_path: /var/www/FreshRSS/extensions
        flags: U
    env_vars:
      - name: TZ
        value: America/Los_Angeles
      - name: CRON_MIN
        value: 1,31 
  ntfy:
    image_url: docker.io/binwiederhier/ntfy
    ip_address_octet: "8"
    volumes:
      - host_path: /appdata/podman/ntfy/cache
        container_path: /var/cache/ntfy
        flag: U
    env_vars: 
      - name: TZ
        value: America/Los_Angeles
  restic_gdrive:
    image_url: docker.io/mazzolino/restic
    ip_address_octet: 9
    volumes:
      - host_path: /home/jdelpilar/.config/containers/secrets/server-backup-494718-de0ac68bf687.json
        container_path: /credentials/gdrive-sa.json
        flag: ro
      - host_path: /storage/backups
        container_path: /data/backups
        flag: ro
      - host_path: /storage/projects
        container_path: /data/projects
        flag: ro
      - host_path: /storage/photos
        container_path: /data/photos
        flag: ro
      - host_path: /appdata
        container_path: /data/appdata
        flag: ro
    env_vars:
      - name: RESTIC_REPOSITORY
        value: rclone:gdrive:/ServerBackups
      - name: RESTIC_PASSWORD
        value: "{{ restic_repo_pass }}"
      - name: RCLONE_CONFIG_GDRIVE_TYPE
        value: "drive"
      - name: RCLONE_CONFIG_GDRIVE_TEAM_DRIVE
        value: 0ABB4XQijFZtPUk9PVA
      - name: RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_FILE
        value: /credentials/gdrive-sa.json
      - name: RESTIC_FORGET_ARGS
        value: "--keep-daily 7 --keep-weekly 4"
      - name: BACKUP_CRON
        value: "0 3 * * *"
    